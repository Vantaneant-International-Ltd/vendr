<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill:#0B0B0B; }
      .h1 { font: 700 38px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#FFFFFF; letter-spacing:0.02em;}
      .sub { font: 400 18px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.72);}
      .label { font: 600 14px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.9); letter-spacing:0.08em;}
      .text { font: 400 16px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.78);}
      .tiny { font: 400 13px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.55);}
      .card { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.14); stroke-width:1; }
      .line { stroke: rgba(255,255,255,0.35); stroke-width:2; stroke-linecap:round; stroke-dasharray:6 10; }
      .ring { stroke: rgba(255,255,255,0.6); stroke-width:2; fill:#0B0B0B; }
      .dot { fill:#FFFFFF; }
      .current { fill:#FFFFFF; }
      .currentText { font: 600 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#0B0B0B; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="h1" x="80" y="100">Vendr — Path to Launch</text>
  <text class="sub" x="80" y="136">A deliberate progression toward premium unattended retail in Ireland</text>

  <line class="line" x1="160" y1="300" x2="1440" y2="300"/>

  <circle class="ring" cx="240" cy="300" r="14"/><circle class="dot" cx="240" cy="300" r="5"/>
  <circle class="ring" cx="560" cy="300" r="14"/><circle class="dot" cx="560" cy="300" r="5"/>
  <circle class="ring" cx="880" cy="300" r="14"/><circle class="dot" cx="880" cy="300" r="5"/>
  <circle class="ring" cx="1200" cy="300" r="14"/><circle class="dot" cx="1200" cy="300" r="5"/>

  <rect class="current" x="190" y="330" width="100" height="30" rx="15"/>
  <text class="currentText" x="240" y="351" text-anchor="middle">CURRENT</text>

  <text class="label" x="200" y="260">SOFT LAUNCH</text>
  <text class="label" x="520" y="260">VALIDATION</text>
  <text class="label" x="840" y="260">OPERATIONS</text>
  <text class="label" x="1160" y="260">LAUNCH</text>

  <rect class="card" x="120" y="400" width="420" height="180" rx="18"/>
  <text class="label" x="160" y="440">SOFT LAUNCH</text>
  <text class="text" x="160" y="472">Establishing presence and credibility.</text>
  <text class="text" x="160" y="500">Listening, learning, refining.</text>

  <rect class="card" x="560" y="400" width="420" height="180" rx="18"/>
  <text class="label" x="600" y="440">VALIDATION</text>
  <text class="text" x="600" y="472">Selective pilot placements.</text>
  <text class="text" x="600" y="500">Proving reliability and fit.</text>

  <rect class="card" x="1000" y="400" width="420" height="180" rx="18"/>
  <text class="label" x="1040" y="440">OPERATIONS AND LAUNCH</text>
  <text class="text" x="1040" y="472">Operational foundations locked.</text>
  <text class="text" x="1040" y="500">Careful expansion begins.</text>

  <text class="tiny" x="80" y="840">Vendr · Launching Spring 2026</text>
</svg>
