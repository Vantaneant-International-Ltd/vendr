name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The admin panel writes site_config.site_mode in Supabase. Each deploy
      # reads it so the panel's "site status" switch controls the public site.
      # Falls back to coming_soon if the fetch fails for any reason.
      - name: Resolve site mode from Supabase
        env:
          SUPABASE_URL: "https://fmmvqlqdhytcxeucdfbj.supabase.co"
          SUPABASE_KEY: "sb_publishable_rpmSPCHja3L2Uy2_RrxjAA_Cz_NyHB2"
        run: |
          MODE=$(curl -fsS "$SUPABASE_URL/rest/v1/site_config?id=eq.1&select=site_mode" \
            -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['site_mode'])" 2>/dev/null || true)
          case "$MODE" in
            coming_soon|maintenance|live) ;;
            *) MODE="coming_soon" ;;
          esac
          echo "Resolved PUBLIC_SITE_MODE=$MODE"
          echo "PUBLIC_SITE_MODE=$MODE" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
