<!doctype html>
<html lang="en" style="background:#0b0a09">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<!-- Vendr on-brand (Felixto book): heavy grotesk display (Archivo) + mono
		     technical type (JetBrains Mono). Monochrome. No serif. -->
		<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
		%sveltekit.head%
	</head>
	<!-- Inline dark paint: client-only routes (admin: ssr=false) would otherwise
	     flash the browser default (white) before JS hydrates and CSS applies.
	     Every page draws its own full-bleed background over this. -->
	<body data-sveltekit-preload-data="hover" style="background:#0b0a09">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
