<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill:#0B0B0B; }
      .h1 { font: 700 36px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#FFFFFF; letter-spacing:0.02em;}
      .sub { font: 400 16px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.70);}
      .label { font: 600 13px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.85); letter-spacing:0.08em; text-transform:uppercase;}
      .text { font: 400 14px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.75);}
      .tiny { font: 400 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:rgba(255,255,255,0.55);}
      .card { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.12); stroke-width:1; }
      .line { stroke: rgba(255,255,255,0.30); stroke-width:2; stroke-linecap:round; stroke-dasharray:6 10; }
      .ring { stroke: rgba(255,255,255,0.55); stroke-width:2; fill:#0B0B0B; }
      .dot { fill:#FFFFFF; }
      .current { fill:#FFFFFF; }
      .currentText { font: 600 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#0B0B0B; }
      .gate { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.18); stroke-width:1; }
      .gateText { font: 600 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(255,255,255,0.78); letter-spacing:0.04em; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="h1" x="80" y="92">Vendr — Roadmap to Spring 2026</text>
  <text class="sub" x="80" y="124">Focused scope · Dotted-line plan · Advance only when gates are met</text>

  <rect class="gate" x="80" y="150" width="1440" height="56" rx="14"/>
  <text class="gateText" x="110" y="184">Scope:</text>
  <text class="tiny" x="180" y="184">
    Curated unattended retail for hospitals and universities · Dublin and commuter belt · Hybrid revenue share · Light tech
  </text>

  <line class="line" x1="120" y1="260" x2="1480" y2="260"/>

  <!-- Phase markers -->
  <circle class="ring" cx="200" cy="260" r="12"/>
  <circle class="dot" cx="200" cy="260" r="4"/>

  <circle class="ring" cx="520" cy="260" r="12"/><circle class="dot" cx="520" cy="260" r="4"/>
  <circle class="ring" cx="840" cy="260" r="12"/><circle class="dot" cx="840" cy="260" r="4"/>
  <circle class="ring" cx="1160" cy="260" r="12"/><circle class="dot" cx="1160" cy="260" r="4"/>
  <circle class="ring" cx="1480" cy="260" r="12"/><circle class="dot" cx="1480" cy="260" r="4"/>

  <!-- Current phase badge -->
  <rect class="current" x="156" y="286" width="88" height="26" rx="13"/>
  <text class="currentText" x="200" y="304" text-anchor="middle">CURRENT</text>

  <text class="label" x="170" y="225">Phase 0</text>
  <text class="tiny" x="155" y="330">Soft launch</text>

  <text class="label" x="490" y="225">Phase 1</text>
  <text class="tiny" x="460" y="290">Validation</text>

  <text class="label" x="810" y="225">Phase 2</text>
  <text class="tiny" x="780" y="290">Operations</text>

  <text class="label" x="1125" y="225">Phase 3</text>
  <text class="tiny" x="1100" y="290">Systems</text>

  <text class="label" x="1440" y="225">Launch</text>
  <text class="tiny" x="1410" y="290">Spring 2026</text>

  <rect class="card" x="80" y="360" width="420" height="210" rx="16"/>
  <text class="label" x="110" y="398">Phase 0 — Soft Launch</text>
  <text class="text" x="110" y="430">vendr.ie live and credible</text>
  <text class="text" x="110" y="454">email enquiries only</text>
  <text class="text" x="110" y="478">institutional positioning</text>
  <text class="tiny" x="110" y="512">Gate: confident sharing with institutions.</text>

  <rect class="card" x="520" y="360" width="420" height="210" rx="16"/>
  <text class="label" x="550" y="398">Phase 1 — Validate</text>
  <text class="text" x="550" y="430">hospital and campus pilots</text>
  <text class="text" x="550" y="454">curated product mix</text>
  <text class="text" x="550" y="478">stable refill rhythm</text>
  <text class="tiny" x="550" y="512">Gate: repeatable operations.</text>

  <rect class="card" x="960" y="360" width="560" height="210" rx="16"/>
  <text class="label" x="990" y="398">Phase 2 — Operations</text>
  <text class="text" x="990" y="430">standard operating procedures</text>
  <text class="text" x="990" y="454">supplier agreements</text>
  <text class="text" x="990" y="478">basic monitoring</text>
  <text class="tiny" x="990" y="512">Gate: ops without firefighting.</text>

  <rect class="card" x="80" y="600" width="700" height="250" rx="16"/>
  <text class="label" x="110" y="638">Phase 3 — Systems</text>
  <text class="text" x="110" y="670">light CRM</text>
  <text class="text" x="110" y="694">separate sales and support</text>
  <text class="text" x="110" y="718">analytics</text>
  <text class="tiny" x="110" y="754">Gate: predictable onboarding.</text>

  <rect class="card" x="820" y="600" width="700" height="250" rx="16"/>
  <text class="label" x="850" y="638">Public Launch</text>
  <text class="text" x="850" y="670">site updates</text>
  <text class="text" x="850" y="694">clear offering</text>
  <text class="text" x="850" y="718">ops-led growth</text>
  <text class="tiny" x="850" y="754">Gate: demand met without quality loss.</text>

  <text class="tiny" x="80" y="870">vendr.ie · internal roadmap · current phase: 0</text>
</svg>
